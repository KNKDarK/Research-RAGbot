<svg width="1000" height="600" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" style="background: #020617; font-family: system-ui, -apple-system, sans-serif; border-radius: 16px;">
  <defs>
    <!-- Background Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#1e293b" />
    </pattern>

    <!-- Gradients for components -->
    <linearGradient id="ingest-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="store-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="ui-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    <linearGradient id="llm-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Card Backgrounds -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0.8" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <!-- Flow Line Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#38bdf8" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#818cf8" />
    </marker>
  </defs>

  <!-- Apply background grid -->
  <rect width="1000" height="600" fill="#020617" rx="16" />
  <rect width="1000" height="600" fill="url(#grid)" rx="16" />

  <!-- Title & Description Header -->
  <text x="50" y="45" font-size="24" font-weight="800" fill="#f8fafc" letter-spacing="-0.5px">RAG Chat Bot Architecture</text>
  <text x="50" y="68" font-size="14" fill="#94a3b8">100% Local Retrieval-Augmented Generation (Ollama, ChromaDB, &amp; Streamlit)</text>

  <!-- ================= INGESTION PIPELINE (LEFT PANEL) ================= -->
  <rect x="40" y="100" width="430" height="460" rx="12" fill="url(#card-bg)" stroke="#1e293b" stroke-width="1.5" />
  <text x="60" y="130" font-size="16" font-weight="700" fill="#38bdf8">Ingestion Pipeline</text>
  <text x="60" y="150" font-size="12" fill="#64748b">Preloads &amp; segments reference documents into vector storage</text>

  <!-- Node: Preloaded Papers -->
  <g transform="translate(60, 180)" filter="url(#shadow)">
    <rect width="170" height="65" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <rect width="4" height="65" rx="2" fill="url(#ingest-grad)" />
    <text x="16" y="28" font-size="13" font-weight="600" fill="#f1f5f9">Preloaded papers</text>
    <text x="16" y="46" font-size="11" fill="#94a3b8">PDF, TXT, MD in ./data</text>
  </g>

  <!-- Node: User Uploads -->
  <g transform="translate(260, 180)" filter="url(#shadow)">
    <rect width="170" height="65" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <rect width="4" height="65" rx="2" fill="url(#ingest-grad)" />
    <text x="16" y="28" font-size="13" font-weight="600" fill="#f1f5f9">User Uploads</text>
    <text x="16" y="46" font-size="11" fill="#94a3b8">Streamlit sidebar upload</text>
  </g>

  <!-- Node: Langchain Loaders & Splitter -->
  <g transform="translate(60, 290)" filter="url(#shadow)">
    <rect width="370" height="65" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <rect width="4" height="65" rx="2" fill="url(#ingest-grad)" />
    <text x="16" y="28" font-size="13" font-weight="600" fill="#f1f5f9">LangChain Loaders &amp; Text Splitter</text>
    <text x="16" y="46" font-size="11" fill="#94a3b8">Chunk Size: 512 tokens | Overlap: 64 tokens</text>
  </g>

  <!-- Node: Embedding model -->
  <g transform="translate(60, 400)" filter="url(#shadow)">
    <rect width="370" height="65" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <rect width="4" height="65" rx="2" fill="url(#ingest-grad)" />
    <text x="16" y="28" font-size="13" font-weight="600" fill="#f1f5f9">Ollama: nomic-embed-text</text>
    <text x="16" y="46" font-size="11" fill="#94a3b8">Generates 768-dim semantic vector representations</text>
  </g>

  <!-- Flow Lines - Ingestion Pipeline -->
  <!-- Preloaded to Loader -->
  <path d="M 145 245 L 145 290" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow-blue)" />
  <!-- Uploads to Loader -->
  <path d="M 345 245 L 345 270 L 245 270 L 245 290" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow-blue)" />
  <!-- Loader to Embeddings -->
  <path d="M 245 355 L 245 400" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow-blue)" />
  <!-- Embeddings to ChromaDB -->
  <path d="M 245 465 L 245 490" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow-blue)" />


  <!-- ================= CENTRAL SHARED VECTOR DATABASE ================= -->
  <!-- Node: ChromaDB -->
  <g transform="translate(145, 490)" filter="url(#shadow)">
    <rect width="200" height="50" rx="25" fill="#1e1b4b" stroke="#4f46e5" stroke-width="2" />
    <text x="100" y="30" font-size="14" font-weight="700" fill="#c084fc" text-anchor="middle">ChromaDB (Persistent)</text>
  </g>


  <!-- ================= RETRIEVAL & GENERATION (RIGHT PANEL) ================= -->
  <rect x="530" y="100" width="430" height="460" rx="12" fill="url(#card-bg)" stroke="#1e293b" stroke-width="1.5" />
  <text x="550" y="130" font-size="16" font-weight="700" fill="#a855f7">Retrieval &amp; Generation Loop</text>
  <text x="550" y="150" font-size="12" fill="#64748b">Queries vectors, builds prompts, and streams LLM answers</text>

  <!-- Node: User Interaction / Streamlit App -->
  <g transform="translate(550, 180)" filter="url(#shadow)">
    <rect width="170" height="65" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <rect width="4" height="65" rx="2" fill="url(#ui-grad)" />
    <text x="16" y="28" font-size="13" font-weight="600" fill="#f1f5f9">Streamlit UI</text>
    <text x="16" y="46" font-size="11" fill="#94a3b8">Interactive Chat Interface</text>
  </g>

  <!-- Node: MMR Retriever -->
  <g transform="translate(750, 180)" filter="url(#shadow)">
    <rect width="170" height="65" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <rect width="4" height="65" rx="2" fill="url(#store-grad)" />
    <text x="16" y="28" font-size="13" font-weight="600" fill="#f1f5f9">MMR Retriever</text>
    <text x="16" y="46" font-size="11" fill="#c084fc">k=4 | fetch_k=12 | λ=0.65</text>
  </g>

  <!-- Node: Chat Prompt Template -->
  <g transform="translate(750, 290)" filter="url(#shadow)">
    <rect width="170" height="65" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <rect width="4" height="65" rx="2" fill="url(#llm-grad)" />
    <text x="16" y="28" font-size="13" font-weight="600" fill="#f1f5f9">Prompt Template</text>
    <text x="16" y="46" font-size="11" fill="#94a3b8">Context + Question</text>
  </g>

  <!-- Node: Ollama Local LLM -->
  <g transform="translate(550, 290)" filter="url(#shadow)">
    <rect width="170" height="65" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <rect width="4" height="65" rx="2" fill="url(#llm-grad)" />
    <text x="16" y="28" font-size="13" font-weight="600" fill="#f1f5f9">Ollama: phi4-mini</text>
    <text x="16" y="46" font-size="11" fill="#6ee7b7">Temp: 0.1 | Local GPU</text>
  </g>

  <!-- Node: Streaming Output -->
  <g transform="translate(550, 400)" filter="url(#shadow)">
    <rect width="370" height="65" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <rect width="4" height="65" rx="2" fill="url(#ui-grad)" />
    <text x="16" y="28" font-size="13" font-weight="600" fill="#f1f5f9">Streaming Response &amp; Sources</text>
    <text x="16" y="46" font-size="11" fill="#94a3b8">Interactive markdown text with cited documents</text>
  </g>

  <!-- Flow Lines - Generation Loop -->
  <!-- User Query to UI -->
  <path d="M 635 245 L 635 290" fill="none" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="3 3" />
  <!-- UI query to Retriever -->
  <path d="M 720 212 L 750 212" fill="none" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arrow-purple)" />
  <!-- ChromaDB to Retriever (MMR Query) -->
  <path d="M 345 515 L 835 515 L 835 245" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-purple)" />
  <!-- Retriever to Prompt Template -->
  <path d="M 835 245 L 835 290" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)" />
  <!-- Prompt to LLM -->
  <path d="M 750 322 L 720 322" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)" />
  <!-- LLM to Streaming output -->
  <path d="M 635 355 L 635 400" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)" />
  <!-- Streaming output back to UI -->
  <path d="M 735 400 L 735 375 L 700 375 L 700 245" fill="none" stroke="#f43f5e" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Vector DB connection to ingestion -->
  <path d="M 245 465 L 245 490" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow-blue)" />

  <!-- Labels on links -->
  <rect x="725" y="198" width="22" height="15" rx="3" fill="#0f172a" />
  <text x="736" y="209" font-size="9" fill="#94a3b8" text-anchor="middle">Ask</text>

  <rect x="735" y="315" width="20" height="15" rx="3" fill="#0f172a" />
  <text x="745" y="326" font-size="9" fill="#94a3b8" text-anchor="middle">Feed</text>

  <rect x="520" y="505" width="120" height="18" rx="4" fill="#0f172a" stroke="#4f46e5" stroke-width="1" />
  <text x="580" y="517" font-size="10" font-weight="600" fill="#c084fc" text-anchor="middle">MMR Retrieval Query</text>

  <rect x="180" y="470" width="55" height="15" rx="3" fill="#0f172a" />
  <text x="207" y="481" font-size="9" fill="#38bdf8" text-anchor="middle">Save Vectors</text>
</svg>
