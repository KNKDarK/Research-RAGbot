# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  # ── Fast checks: run on every commit ──────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
        stages: [pre-commit]
      - id: ruff-format
        stages: [pre-commit]

  - repo: https://github.com/pycqa/pylint
    rev: v3.2.7
    hooks:
      - id: pylint
        args: [--rcfile=.pylintrc]
        exclude: tests/
        stages: [pre-commit]

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py311-plus]
        stages: [pre-commit]

  # ── Heavy checks: run only on push ────────────────────────────────
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: myvenv/bin/python -m mypy
        language: system
        types: [python]
        pass_filenames: true
        args: [--ignore-missing-imports]
        stages: [pre-commit]

      - id: vulture
        name: vulture
        entry: myvenv/bin/python -m vulture
        language: system
        pass_filenames: false
        always_run: true
        args: ["--exclude", "myvenv,builds", "--min-confidence", "100", "."]
        stages: [pre-push]

      - id: pytest
        name: pytest
        entry: env PYTHONPATH=. myvenv/bin/python -m pytest --cov=. --cov-report=term-missing --cov-fail-under=20
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: bandit
        name: bandit
        entry: myvenv/bin/python -m bandit
        language: system
        types: [python]
        pass_filenames: true
        args: ["-r", "-ll", "-c", "bandit.yaml"]
        stages: [pre-push]

      - id: uv-audit
        name: uv audit
        entry: myvenv/bin/uv audit
        language: system
        pass_filenames: false
        always_run: true
        args: ["--ignore", "CVE-2026-45829"]
        stages: [pre-push]

      - id: semgrep
        name: semgrep
        entry: myvenv/bin/python -m semgrep
        language: system
        pass_filenames: false
        always_run: true
        args:
          [
            "--config=auto",
            "--error",
            "--exclude=myvenv",
            "--exclude=builds",
            "--exclude=chroma_db",
            "--exclude=.git",
          ]
        stages: [pre-push]
