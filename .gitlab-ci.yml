stages:
  - test
  - security
  - secret-detection

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SECRET_DETECTION_ENABLED: 'true'
  PIP_CACHE_DIR: ${CI_PROJECT_DIR}/.cache/pip

.python-test:
  stage: test
  image: python:3.11-slim
  cache:
    paths:
      - .cache/pip
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt

ruff:
  extends: .python-test
  script:
    - ruff check .
    - ruff format --check .

mypy:
  extends: .python-test
  script:
    - mypy . --ignore-missing-imports

pytest:
  extends: .python-test
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+%)/'
  script:
    - PYTHONPATH=. pytest --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=20
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 1 week

bandit:
  extends: .python-test
  stage: security
  script:
    - bandit -r . -ll -c bandit.yaml

pre-commit:
  stage: test
  image: python:3.11-slim
  variables:
    PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
  cache:
    paths:
      - .cache/pre-commit
  before_script:
    - pip install pre-commit
    - python -m venv myvenv
    - source myvenv/bin/activate
    - pip install -r requirements.txt
  script:
    - PYTHONPATH=. pre-commit run --all-files --show-diff-on-failure

secret_detection:
  stage: secret-detection
