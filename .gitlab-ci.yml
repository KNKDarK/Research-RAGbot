workflow:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always

stages:
  - lint
  - format
  - type_check
  - test
  - security
  - secret-detection

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SECRET_DETECTION_ENABLED: 'true'
  PIP_CACHE_DIR: ${CI_PROJECT_DIR}/.cache/pip

.python-base:
  image: python:3.11-slim
  cache:
    key:
      files:
        - requirements.txt
      prefix: pip
    paths:
      - .cache/pip
  before_script:
    - pip install --upgrade pip --quiet
    - pip install -r requirements.txt --quiet
  interruptible: true

ruff-lint:
  stage: lint
  extends: .python-base
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  script:
    - ruff check .

ruff-format:
  stage: format
  extends: .python-base
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  script:
    - ruff format --check .

mypy:
  stage: type_check
  extends: .python-base
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  script:
    - mypy . --ignore-missing-imports

pytest:
  stage: test
  extends: .python-base
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+%)/'
  script:
    - PYTHONPATH=. pytest --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=20
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 1 week

bandit:
  stage: security
  extends: .python-base
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  script:
    - bandit -r . -ll -c bandit.yaml

pip-audit:
  stage: security
  extends: .python-base
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  script:
    - pip-audit

sast:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always

secret_detection:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
