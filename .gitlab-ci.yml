workflow:
  rules:
    - when: always

stages:
  - lint
  - format
  - type_check
  - test
  - security
  - secret-detection

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SECRET_DETECTION_ENABLED: 'true'
  SAST_EXCLUDED_PATHS: 'builds,cache,.venv,myvenv,chroma_db'
  SECRET_DETECTION_EXCLUDED_PATHS: 'builds,cache,.venv,myvenv,chroma_db'
  PIP_CACHE_DIR: ${CI_PROJECT_DIR}/.cache/pip
  VENV_DIR: ${CI_PROJECT_DIR}/.venv

.python-base:
  image: python:3.11-slim
  cache:
    key:
      files:
        - requirements.txt
      prefix: pip
    paths:
      - .cache/pip
      - .venv
  before_script:
    - |
      if command -v python3 >/dev/null; then
        PYTHON_BIN=python3
      elif command -v python >/dev/null; then
        PYTHON_BIN=python
      else
        echo "python3 or python is required on the shell runner"
        exit 1
      fi
      "$PYTHON_BIN" -m venv "$VENV_DIR"
    - ${VENV_DIR}/bin/python -m pip install --upgrade pip --quiet
    - ${VENV_DIR}/bin/python -m pip install -r requirements.txt --quiet
  interruptible: true

tag-pipeline:
  stage: test
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG
      when: on_success
    - when: never
  script:
    - echo "Tag pipeline passed for ${CI_COMMIT_TAG}"

ruff-lint:
  stage: lint
  extends: .python-base
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  script:
    - ${VENV_DIR}/bin/python -m ruff check .

ruff-format:
  stage: format
  extends: .python-base
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  script:
    - ${VENV_DIR}/bin/python -m ruff format --check .

mypy:
  stage: type_check
  extends: .python-base
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  script:
    - ${VENV_DIR}/bin/python -m mypy . --ignore-missing-imports

pytest:
  stage: test
  extends: .python-base
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+%)/'
  script:
    - PYTHONPATH=. ${VENV_DIR}/bin/python -m pytest --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=20
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 1 week

bandit:
  stage: security
  extends: .python-base
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  script:
    - ${VENV_DIR}/bin/python -m bandit -r . -ll -c bandit.yaml

uv-audit:
  stage: security
  extends: .python-base
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  script:
    - ${VENV_DIR}/bin/uv audit --ignore CVE-2026-45829

sast:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always

secret_detection:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
