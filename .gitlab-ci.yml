stages:
  - build
  - lint
  - format
  - type_check
  - test
  - security
  - secret-detection

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SECRET_DETECTION_ENABLED: 'true'
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ''

.python-base:
  image: ${CI_REGISTRY_IMAGE}/ci:latest
  interruptible: true

build-ci-image:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE/ci:latest -f ci.Dockerfile .
    - docker push $CI_REGISTRY_IMAGE/ci:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - requirements.txt
        - ci.Dockerfile
      when: always
    - when: never

ruff-lint:
  stage: lint
  extends: .python-base
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  script:
    - ruff check .

ruff-format:
  stage: format
  extends: .python-base
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  script:
    - ruff format --check .

mypy:
  stage: type_check
  extends: .python-base
  script:
    - mypy . --ignore-missing-imports

pytest:
  stage: test
  extends: .python-base
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+%)/'
  script:
    - PYTHONPATH=. pytest --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=20
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 1 week

bandit:
  stage: security
  extends: .python-base
  script:
    - bandit -r . -ll -c bandit.yaml

pip-audit:
  stage: security
  extends: .python-base
  script:
    - pip-audit

secret_detection:
  stage: secret-detection
